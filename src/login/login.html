<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EriniumGroup — Connexion</title>
  <link rel="stylesheet" href="../shared/styles.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>
  <!-- Custom titlebar (minimal, just close button) -->
  <div class="titlebar titlebar-login">
    <span></span>
    <div class="titlebar-controls">
      <button class="titlebar-btn close" id="btnClose" title="Fermer">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <line x1="2" y1="2" x2="12" y2="12"/><line x1="12" y1="2" x2="2" y2="12"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="login-container fade-in">
    <!-- Ambient glows -->
    <div class="ambient-glow glow-violet"></div>
    <div class="ambient-glow glow-cyan"></div>

    <!-- Logo -->
    <div class="logo-area">
      <div class="logo-glow"></div>
      <svg class="logo-icon" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#6B2FA0" />
            <stop offset="50%" style="stop-color:#C8A0FF" />
            <stop offset="100%" style="stop-color:#00E5FF" />
          </linearGradient>
        </defs>
        <polygon points="60,8 108,32 108,88 60,112 12,88 12,32"
                 fill="none" stroke="url(#logoGrad)" stroke-width="3"
                 stroke-linejoin="round" />
        <polygon points="60,22 94,40 94,80 60,98 26,80 26,40"
                 fill="none" stroke="url(#logoGrad)" stroke-width="1.5"
                 stroke-linejoin="round" opacity="0.5" />
        <text x="60" y="70" text-anchor="middle" fill="url(#logoGrad)"
              font-family="Inter, sans-serif" font-weight="800" font-size="40">E</text>
      </svg>
    </div>

    <!-- Title -->
    <h1 class="login-title">
      <span class="gradient-text">EriniumGroup</span>
    </h1>

    <p class="login-subtitle">Connectez-vous pour acceder au serveur</p>

    <!-- Discord login button -->
    <div class="login-actions" id="loginActions">
      <button class="btn btn-discord" id="btnDiscord">
        <svg width="20" height="15" viewBox="0 0 71 55" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M60.1045 4.8978C55.5792 2.8214 50.7265 1.2916 45.6527 0.41542C45.5603 0.39851 45.468 0.440769 45.4204 0.525289C44.7963 1.6353 44.105 3.0834 43.6209 4.2216C38.1637 3.4046 32.7345 3.4046 27.3892 4.2216C26.905 3.0581 26.1886 1.6353 25.5617 0.525289C25.5141 0.443589 25.4218 0.40133 25.3294 0.41542C20.2584 1.2888 15.4057 2.8186 10.8776 4.8978C10.8384 4.9147 10.8048 4.9429 10.7825 4.9795C1.57795 18.7309 -0.943561 32.1443 0.293408 45.3914C0.299005 45.4562 0.335386 45.5182 0.385761 45.5576C6.45866 50.0174 12.3413 52.7249 18.1147 54.5195C18.2071 54.5477 18.305 54.5139 18.3638 54.4378C19.7295 52.5728 20.9469 50.6063 21.9907 48.5383C22.0523 48.4172 21.9935 48.2735 21.8676 48.2256C19.9366 47.4931 18.0979 46.6 16.3292 45.5858C16.1893 45.5041 16.1781 45.304 16.3068 45.2082C16.679 44.9293 17.0513 44.6391 17.4067 44.3461C17.471 44.2926 17.5606 44.2813 17.6362 44.3151C29.2558 49.6202 41.8354 49.6202 53.3179 44.3151C53.3## 44.2785 53.4831 44.2898 53.5502 44.3433C53.9057 44.6363 54.2779 44.9293 54.6529 45.2082C54.7816 45.304 54.7732 45.5041 54.6333 45.5858C52.8646 46.6197 51.0259 47.4931 49.0921 48.2228C48.9662 48.2707 48.9102 48.4172 48.9718 48.5383C50.038 50.6034 51.2554 52.57 52.5959 54.435C52.6519 54.5139 52.7526 54.5477 52.845 54.5195C58.6464 52.7249 64.529 50.0174 70.6019 45.5576C70.6551 45.5182 70.6887 45.459 70.6943 45.3942C72.1747 30.0791 68.2147 16.7757 60.1968 4.9823C60.1772 4.9429 60.1437 4.9147 60.1045 4.8978ZM23.7259 37.3253C20.2276 37.3253 17.3451 34.1136 17.3451 30.1693C17.3451 26.225 20.1717 23.0133 23.7259 23.0133C27.308 23.0133 30.1626 26.2532 30.1099 30.1693C30.1099 34.1136 27.2802 37.3253 23.7259 37.3253ZM47.3178 37.3253C43.8196 37.3253 40.9371 34.1136 40.9371 30.1693C40.9371 26.225 43.7636 23.0133 47.3178 23.0133C50.9 23.0133 53.7545 26.2532 53.7018 30.1693C53.7018 34.1136 50.9 37.3253 47.3178 37.3253Z"/>
        </svg>
        Se connecter avec Discord
      </button>

      <!-- Dev login button (hidden in production, shown only in dev) -->
      <button class="btn btn-ghost btn-dev hidden" id="btnDevLogin">
        Connexion Dev (test)
      </button>
    </div>

    <!-- Loading state -->
    <div class="login-loading hidden" id="loginLoading">
      <div class="glass-panel-sm loading-box">
        <div class="spinner-ring small"></div>
        <span>Connexion en cours...</span>
      </div>
    </div>

    <!-- Error state -->
    <div class="login-error hidden" id="loginError">
      <div class="glass-panel-sm error-box">
        <p class="error-message" id="errorMessage">Erreur inconnue</p>
        <button class="btn btn-ghost" id="btnRetry">Reessayer</button>
      </div>
    </div>

    <!-- Footer -->
    <div class="login-footer">
      <p class="login-cgv">En vous connectant, vous acceptez nos <a href="#" id="linkCgv">CGV</a></p>
      <button class="btn-link" id="btnQuit">Quitter</button>
      <p class="version-text" id="versionText">v1.0.0</p>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
